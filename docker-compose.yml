services:
  postgres:
    image: postgres:16-alpine
    container_name: sophie-postgres
    environment:
      POSTGRES_DB: sophie
      POSTGRES_USER: sophie
      POSTGRES_PASSWORD: sophie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sophie -d sophie"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
